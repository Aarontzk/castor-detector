name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      # Unit tests only — model-based tests (mpnet + NLI, ~1.2GB downloads)
      # run locally, not in CI. See tests/test_e2e*.py.
      - name: Unit tests
        run: >
          pytest -q
          --ignore=tests/test_e2e.py
          --ignore=tests/test_e2e_full.py
          --ignore=tests/test_entailment.py
          --ignore=tests/test_cli.py
